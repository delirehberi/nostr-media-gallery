<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nostr Gallery — Settings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #1a1a1a; color: #fff; padding: 24px; max-width: 560px; }
    h1 { font-size: 18px; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; }
    label { display: block; font-size: 13px; color: #ccc; margin-bottom: 6px; }
    #relay-list { list-style: none; margin-bottom: 16px; }
    #relay-list li { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    #relay-list input {
      flex: 1; padding: 8px 10px; background: #2a2a2a; border: 1px solid #444;
      color: #fff; border-radius: 4px; font-size: 13px;
    }
    #relay-list input:focus { outline: none; border-color: #4a90e2; }
    .btn-remove {
      background: none; border: 1px solid #555; color: #aaa; cursor: pointer;
      border-radius: 4px; padding: 6px 10px; font-size: 13px; white-space: nowrap;
    }
    .btn-remove:hover { border-color: #e25555; color: #e25555; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      padding: 9px 16px; border: none; border-radius: 4px; cursor: pointer;
      font-size: 13px; font-weight: 500;
    }
    #btn-add { background: #2a2a2a; border: 1px solid #555; color: #ccc; }
    #btn-add:hover { border-color: #4a90e2; color: #4a90e2; }
    #btn-save { background: #4a90e2; color: #fff; }
    #btn-save:hover { background: #357abd; }
    #btn-reset { background: none; border: 1px solid #555; color: #888; }
    #btn-reset:hover { border-color: #aaa; color: #ccc; }
    #status { font-size: 12px; color: #6abf6a; margin-top: 12px; min-height: 18px; }
  </style>
</head>
<body>
  <h1>Nostr Gallery Settings</h1>
  <p class="subtitle">Configure which relays to query when generating a gallery.</p>

  <label>Relays</label>
  <ul id="relay-list"></ul>

  <div class="actions">
    <button id="btn-add" class="btn">+ Add relay</button>
    <button id="btn-save" class="btn">Save</button>
    <button id="btn-reset" class="btn">Reset to defaults</button>
  </div>
  <div id="status"></div>

  <script src="options.js" defer></script>
</body>
</html>
