<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; padding: 15px; font-family: sans-serif; background: #1a1a1a; color: white; }
    input { width: 100%; padding: 8px; margin-bottom: 10px; background: #333; border: 1px solid #555; color: white; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #4a90e2; border: none; color: white; cursor: pointer; border-radius: 4px; }
    button:hover { background: #357abd; }
    #status { font-size: 12px; margin-top: 10px; color: #aaa; }
    #settings-link { display: block; font-size: 11px; color: #555; text-align: right; margin-top: 10px; cursor: pointer; text-decoration: underline; }
    #settings-link:hover { color: #888; }
  </style>
</head>
<body>
  <h3>Nostr Gallery</h3>
  <input type="text" id="address" placeholder="npub... or nprofile...">
  <button id="fetchBtn">Generate Gallery</button>
  <div id="status"></div>
  <span id="settings-link">Relay settings</span>
  <script src="popup.js" defer></script>
</body>
</html>
